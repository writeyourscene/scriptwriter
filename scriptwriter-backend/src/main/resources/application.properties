spring.application.name=scriptwriter-backend

server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/scriptwriter
spring.datasource.username=postgres
spring.datasource.password=6563

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JWT (use environment variables in production)
jwt.secret=${JWT_SECRET:c2NyaXB0d3JpdGVySldUU2VjcmV0S2V5Rm9yU2NyaXB0V3JpdGVyQXBwMjAyNg==}
jwt.access-token-expiration=1800000
jwt.refresh-token-expiration=604800000

# Auth
auth.max-failed-attempts=5
auth.lock-duration-minutes=15

# OTP
otp.expiry-minutes=5

# Google OAuth (set to true when configured)
google.oauth.enabled=false

# Projects
project.trash-retention-days=30

# AI
ai.provider=stub

# Script editor
script.autosave-debounce-ms=2000

# CORS
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

